spawnmenu.menu.swcs_cvar_individual_ammo_desc=Ammo is stored on the weapon instead of the player. Reserve ammo can only be replenished using ammo boxes.
spawnmenu.menu.swcs_cvar_hl2_ammo=Use default ammo types
