spawnmenu.menu.swcs_cvar_show_impacts=Show bullet impacts
spawnmenu.menu.swcs_cvar_show_impacts_desc=0 - Off\n1 - Client and Server\n2 - Client only\n3 - Server only\n\nRequires \"developer\" cvar set to \"1\" to see.
