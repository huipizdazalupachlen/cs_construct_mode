# sv cvars
spawnmenu.menu.swcs_cvar_sync_seed=Sync bullet spread seed
spawnmenu.menu.swcs_cvar_sync_seed_desc=Whether or not the bullet spread seed should be synced between server and client.\nDisabling makes it harder for cheaters to predict what the spread seed is serverside.
spawnmenu.menu.swcs_cvar_nospread=Enable weapon nospread
#spawnmenu.menu.swcs_cvar_nospread_desc=Whether or not to enable weapon nospread.\nDisabling makes it harder for cheaters to predict where their bullets will land.
